<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订单发货管理</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f7f6;
      color: #17201a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 36px;
    }

    .muted {
      margin: 8px 0 0;
      color: #65736a;
      font-size: 14px;
      line-height: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border: 1px solid #e2e8e4;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(26, 50, 35, 0.05);
    }

    .panel + .panel {
      margin-top: 16px;
    }

    .panel-title {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 26px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #405047;
      font-size: 13px;
      line-height: 20px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid #cfd8d2;
      border-radius: 6px;
      padding: 9px 11px;
      background: #fff;
      color: #17201a;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2f7d43;
      box-shadow: 0 0 0 3px rgba(47, 125, 67, 0.12);
    }

    .field {
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      background: #2f7d43;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #e8f1eb;
      color: #246438;
    }

    button.danger {
      background: #9b2f2f;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .kv {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr);
      gap: 8px 12px;
      font-size: 14px;
      line-height: 22px;
    }

    .kv dt {
      color: #65736a;
    }

    .kv dd {
      margin: 0;
      word-break: break-all;
    }

    .goods {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .goods-item {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      gap: 12px;
      padding: 10px;
      border: 1px solid #e7ece8;
      border-radius: 6px;
    }

    .thumb {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      object-fit: cover;
      background: #eef2ef;
    }

    .goods-title {
      font-weight: 700;
      line-height: 22px;
    }

    .goods-sub {
      margin-top: 4px;
      color: #65736a;
      font-size: 13px;
      line-height: 20px;
    }

    .notice {
      min-height: 42px;
      margin-bottom: 16px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #eef6f0;
      color: #235b34;
      font-size: 14px;
      line-height: 22px;
      display: none;
      white-space: pre-wrap;
    }

    .notice.error {
      background: #fff0f0;
      color: #8a2525;
    }

    .notice.show {
      display: block;
    }

    .checkbox-row {
      display: flex;
      gap: 8px;
      align-items: center;
      color: #405047;
      font-size: 14px;
    }

    .checkbox-row input {
      width: auto;
      min-height: auto;
    }

    .raw {
      max-height: 320px;
      overflow: auto;
      padding: 12px;
      border-radius: 6px;
      background: #101712;
      color: #dceee1;
      font-size: 12px;
      line-height: 18px;
      white-space: pre-wrap;
    }

    @media (max-width: 840px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>订单发货管理</h1>
        <p class="muted">录入物流后会先同步微信发货信息，成功后再更新本地订单状态与物流轨迹。</p>
      </div>
      <div class="field" style="min-width:260px;margin-bottom:0">
        <label for="adminToken">管理 Token（如已配置 ADMIN_TOKEN）</label>
        <input id="adminToken" type="password" autocomplete="off" placeholder="可留空">
      </div>
    </header>

    <div id="notice" class="notice"></div>

    <section class="grid">
      <div>
        <section class="panel">
          <h2 class="panel-title">查找订单</h2>
          <div class="row">
            <div class="field">
              <label for="orderNo">订单号</label>
              <input id="orderNo" value="ORD1779679337988cpvs" placeholder="ORD...">
            </div>
            <div class="field">
              <label>&nbsp;</label>
              <button id="loadOrder" type="button">查询订单</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2 class="panel-title">订单信息</h2>
          <dl id="orderSummary" class="kv">
            <dt>状态</dt><dd>未查询</dd>
          </dl>
          <div id="goodsList" class="goods"></div>
        </section>

        <section class="panel">
          <h2 class="panel-title">接口返回</h2>
          <pre id="rawResult" class="raw">等待操作</pre>
        </section>
      </div>

      <aside>
        <section class="panel">
          <h2 class="panel-title">同步发货</h2>
          <div class="field">
            <label for="trackingNo">物流单号</label>
            <input id="trackingNo" placeholder="请输入真实快递单号">
          </div>
          <div class="field">
            <label for="expressCompany">微信快递公司编码</label>
            <select id="expressCompany">
              <option value="SF">SF - 顺丰速运</option>
              <option value="YTO">YTO - 圆通速递</option>
              <option value="ZTO">ZTO - 中通快递</option>
              <option value="STO">STO - 申通快递</option>
              <option value="YD">YD - 韵达快递</option>
              <option value="JD">JD - 京东物流</option>
              <option value="EMS">EMS - EMS</option>
              <option value="DBL">DBL - 德邦快递</option>
              <option value="JTSD">JTSD - 极兔速递</option>
            </select>
          </div>
          <div class="field">
            <label for="expressCompanyName">本地显示名称</label>
            <input id="expressCompanyName" value="顺丰速运">
          </div>
          <div class="field">
            <label for="receiverContact">收件人手机号</label>
            <input id="receiverContact" placeholder="默认取订单地址手机号">
          </div>
          <div class="field">
            <label for="itemDesc">商品描述</label>
            <input id="itemDesc" placeholder="默认取订单商品名">
          </div>
          <div class="field checkbox-row">
            <input id="localOnly" type="checkbox">
            <span>仅更新本地订单（调试用，不同步微信）</span>
          </div>
          <div class="actions">
            <button id="shipOrder" type="button">同步发货</button>
            <button id="fillDemo" class="secondary" type="button">填充示例单号</button>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const state = { order: null };
    const $ = (id) => document.getElementById(id);

    const expressNameMap = {
      SF: '顺丰速运',
      YTO: '圆通速递',
      ZTO: '中通快递',
      STO: '申通快递',
      YD: '韵达快递',
      JD: '京东物流',
      EMS: 'EMS',
      DBL: '德邦快递',
      JTSD: '极兔速递',
    };

    function headers() {
      const token = $('adminToken').value.trim();
      const result = { 'Content-Type': 'application/json' };
      if (token) result['x-admin-token'] = token;
      return result;
    }

    function showNotice(message, isError = false) {
      const notice = $('notice');
      notice.textContent = message;
      notice.className = `notice show${isError ? ' error' : ''}`;
    }

    function setRaw(data) {
      $('rawResult').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    function money(fen) {
      return `¥${(Number(fen || 0) / 100).toFixed(2)}`;
    }

    function renderOrder(order) {
      state.order = order;
      const logistics = order.logisticsVO || {};
      const payment = order.paymentVO || {};
      $('orderSummary').innerHTML = `
        <dt>订单号</dt><dd>${order.orderNo || '-'}</dd>
        <dt>订单状态</dt><dd>${order.orderStatusName || '-'}（${order.orderStatus || '-'}）</dd>
        <dt>微信支付单号</dt><dd>${payment.transactionId || payment.channelTrxNo || '-'}</dd>
        <dt>付款人 openid</dt><dd>${order.uid || '-'}</dd>
        <dt>实付金额</dt><dd>${money(order.paymentAmount)}</dd>
        <dt>收件人</dt><dd>${logistics.receiverName || '-'} ${logistics.receiverPhone || ''}</dd>
        <dt>收货地址</dt><dd>${[
          logistics.receiverProvince,
          logistics.receiverCity,
          logistics.receiverCountry,
          logistics.receiverArea,
          logistics.receiverAddress,
        ].filter(Boolean).join(' ') || '-'}</dd>
        <dt>物流</dt><dd>${logistics.logisticsCompanyName || '-'} ${logistics.logisticsNo || ''}</dd>
      `;

      $('receiverContact').value = logistics.receiverPhone || '';
      $('itemDesc').value = (order.orderItemVOs || []).map((item) => item.goodsName).filter(Boolean).join('、').slice(0, 120);
      $('goodsList').innerHTML = (order.orderItemVOs || []).map((item) => `
        <article class="goods-item">
          <img class="thumb" src="${item.thumb || item.goodsPictureUrl || ''}" alt="">
          <div>
            <div class="goods-title">${item.goodsName || '商品'}</div>
            <div class="goods-sub">SKU：${item.skuId || '-'}　数量：${item.buyQuantity || 1}　金额：${money(item.itemPaymentAmount || item.actualPrice)}</div>
          </div>
        </article>
      `).join('');
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      const json = await response.json().catch(() => ({}));
      if (!response.ok || json.code !== 0) {
        throw new Error(json.message || `请求失败：${response.status}`);
      }
      return json;
    }

    async function loadOrder() {
      const orderNo = $('orderNo').value.trim();
      if (!orderNo) {
        showNotice('请先填写订单号', true);
        return;
      }

      $('loadOrder').disabled = true;
      try {
        const json = await requestJson(`/api/admin/order/${encodeURIComponent(orderNo)}`, {
          headers: headers(),
        });
        renderOrder(json.data);
        setRaw(json);
        showNotice('订单已加载');
      } catch (err) {
        showNotice(err.message, true);
        setRaw(err.message);
      } finally {
        $('loadOrder').disabled = false;
      }
    }

    async function shipOrder() {
      const payload = {
        orderNo: $('orderNo').value.trim(),
        trackingNo: $('trackingNo').value.trim(),
        expressCompany: $('expressCompany').value.trim(),
        expressCompanyName: $('expressCompanyName').value.trim(),
        receiverContact: $('receiverContact').value.trim(),
        itemDesc: $('itemDesc').value.trim(),
        localOnly: $('localOnly').checked,
      };

      if (!payload.orderNo || !payload.trackingNo || !payload.expressCompany) {
        showNotice('订单号、物流单号、快递公司编码都必填', true);
        return;
      }

      $('shipOrder').disabled = true;
      try {
        const json = await requestJson('/api/admin/order/ship', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify(payload),
        });
        renderOrder(json.data.order);
        setRaw(json);
        showNotice(json.message || '发货成功');
      } catch (err) {
        showNotice(err.message, true);
        setRaw(err.message);
      } finally {
        $('shipOrder').disabled = false;
      }
    }

    $('expressCompany').addEventListener('change', () => {
      $('expressCompanyName').value = expressNameMap[$('expressCompany').value] || $('expressCompany').value;
    });
    $('loadOrder').addEventListener('click', loadOrder);
    $('shipOrder').addEventListener('click', shipOrder);
    $('fillDemo').addEventListener('click', () => {
      $('trackingNo').value = `SF${Date.now()}`;
    });

    loadOrder();
  </script>
</body>
</html>
